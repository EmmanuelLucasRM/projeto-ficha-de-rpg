    </div>

            <option>Humano</option>
            <option>Esqueleto</option>
            <option>Hypnobrai</option>

            <option>Constrictai</option>
            <option>Venomari</option>

            <option>Nindroids</option>
            <option>Stone Army</option>
            <option>Fantasma</option>
            <option>Djinn</option>
            <option>Formlings</option>
            <option>Tritões</option>
            <option>Insectoids</option>
            <option>Vermillion</option>
            <option>Yeti</option>
            <option>Lobos da Neve</option>
        </select>
    </div>
    <div>
        <p>Informe seu nivel:</p>
        <input type="number">
    </div>
    <div>
        <p>Informe sua historia:</p>
        <textarea></textarea>
    </div>
    <div>
        <p>Informe seu objetivo:</p>
        <textarea></textarea>
    </div>
