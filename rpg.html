<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>RPG</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='rpg.css'>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

</head>

<body>
    <header class="banner">
        <div class="banner-content">
            <h1>Ninjago RPG - Ficha</h1>
            <p class="subtitulo">Preencha as informações dos seus personagens</p>

        </div>
    </header>
    <main class="container">

        <section class="ficha">
            <h3>Informações Basicas</h3>
            <section class="info">

                <div class="campo">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite o nome do seu personagem">
                </div>
                <div class="campo">
                    <label for="idade">Idade:</label>
                    <input type="number" id="idade" name="idade" placeholder="Digite a idade de seu personagem">
                </div>
                <div class="campo">
                    <label for="raca">Raça</label>
                    <select id="raca" name="raca">
                        <option value="">Selecione uma raça</option>
                        <option>Humano</option>
                        <option>Esqueleto</option>
                        <option>Hypnobrai</option>
                        <option>Fangpyre</option>
                        <option>Constrictai</option>
                        <option>Venomari</option>
                        <option>Anacondrai</option>
                        <option>Nindroids</option>
                        <option>Stone Army</option>
                        <option>Fantasma</option>
                        <option>Djinn</option>
                        <option>Formlings</option>
                        <option>Tritões</option>
                        <option>Insectoids</option>
                        <option>Vermillion</option>
                        <option>Yeti</option>
                        <option>Lobos da Neve</option>
                    </select>
                </div>
                <div class="campo">
                    <label for="elemento">Elemento:</label>
                    <input type="text" name="elemento" id="elemento" placeholder="Digite seu elemento">
                </div>
                <div class="campo">
                    <label for="profissao">Profissão:</label>
                    <select name="profissao" id="profissao">
                        <option value="">Selecione uma profissão</option>
                        <option>Ferreiro</option>
                        <option>Inventor</option>
                        <option>Dançarino</option>
                        <option>Cozinheiro</option>
                        <option>Mecânico</option>
                        <option>Policial</option>
                        <option>Médico</option>
                        <option>Lutador Marcial</option>
                        <option>Minerador</option>
                        <option>Influenciador Digital</option>
                        <option>Atleta</option>
                        <option>Carpinteiro</option>
                        <option>Estudioso</option>
                    </select>
                </div>
                <div class="campo">
                    <label for="historia">História:</label>
                    <textarea id="historia" name="historia" rows="5" placeholder="Digite a história"></textarea>
                </div>
                <div class="campo">
                    <label for="objetivo">Objetivo:</label>
                    <textarea id="objetivo" name="objetivo" rows="5" placeholder="Descreva o objetivo"></textarea>
                </div>
            </section>
            <h3>Atributos</h3>
            <section class="atributos">

                <div class="atributo">
                    <p class="nome-atributo">Carisma</p>
                    <div class="controle">
                        <button>-</button>
                        <span class="valor">0</span>
                        <button>+</button>
                    </div>
                </div>
                <div class="atributo">
                    <p class="nome-atributo">Constituição</p>
                    <div class="controle">
                        <button>-</button>
                        <span class="valor">0</span>
                        <button>+</button>
                    </div>
                </div>
                <div class="atributo">
                    <p class="nome-atributo">Destreza</p>
                    <div class="controle">
                        <button>-</button>
                        <span class="valor">0</span>
                        <button>+</button>
                    </div>
                </div>
                <div class="atributo">
                    <p class="nome-atributo">Elemento</p>
                    <div class="controle">
                        <button>-</button>
                        <span class="valor">0</span>
                        <button>+</button>
                    </div>
                </div>
                <div class="atributo">
                    <p class="nome-atributo">Força</p>
                    <div class="controle">
                        <button>-</button>
                        <span class="valor">0</span>
                        <button>+</button>
                    </div>
                </div>
                <div class="atributo">
                    <p class="nome-atributo">Inteligência</p>
                    <div class="controle">
                        <button>-</button>
                        <span class="valor">0</span>
                        <button>+</button>
                    </div>
                </div>
                <div class="atributo">
                    <p class="nome-atributo">Vontade</p>
                    <div class="controle">
                        <button>-</button>
                        <span class="valor">0</span>
                        <button>+</button>
                    </div>
                </div>

            </section>
            <div class="acoes">
                <button type="button">Salvar Ficha</button>
            </div>
            <script src='main.js'></script>
        </section>
    </main>
</body>

</html>
